  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with: { node-version: "20", cache: "npm" }
  #     - run: npm ci
  #     - run: npx playwright install --with-deps chromium
  #     - run: npm run test:e2e
